<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Quiz</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Create New Quiz</h1>
        <a href="{{ url_for('admin') }}" class="btn btn-secondary">Back to Admin</a>
        
        <form method="POST" id="quizForm" enctype="multipart/form-data">
            <div class="form-group">
                <label for="title">Quiz Title:</label>
                <input type="text" name="title" id="title" placeholder="Enter quiz title" required>
            </div>
            <div class="form-group">
                <label for="description">Description:</label>
                <textarea name="description" id="description" rows="3" placeholder="Enter quiz description"></textarea>
            </div>
            
            <h2>Questions</h2>
            <div id="questionsContainer"></div>
            
            <div class="form-actions" style="margin-top: 30px; border-top: 1px solid #ddd; padding-top: 20px;">
                <button type="button" class="btn btn-secondary" onclick="addQuestion()">+ Add Question</button>
                <button type="submit" class="btn btn-primary" style="float: right;">Create Quiz</button>
            </div>
            
            <input type="hidden" name="question_count" id="questionCount" value="0">
        </form>
    </div>
    
    <script>
        function syncRadio(input) {
            const radio = input.parentElement.querySelector('input[type="radio"]');
            radio.value = input.value;
        }

        function addOption(qNum) {
            const grid = document.getElementById('options_grid_' + qNum);
            const count = grid.querySelectorAll('.option-input').length + 1;
            const div = document.createElement('div');
            div.className = 'option-input';
            div.innerHTML = `
                <input type="radio" name="answer${qNum}" value="" required>
                <input type="text" name="options_${qNum}[]" placeholder="Option ${count}" oninput="syncRadio(this)" required>
                <button type="button" class="btn btn-small btn-danger" onclick="this.parentElement.remove()">×</button>
            `;
            grid.appendChild(div);
        }

        function addQuestion() {
            const count = document.querySelectorAll('.question-block').length + 1;
            const container = document.getElementById('questionsContainer');
            const div = document.createElement('div');
            div.className = 'question-block';
            div.id = 'question_' + count;
            div.innerHTML = `
                <h3>Question ${count}</h3>
                <div class="form-group">
                    <label>Question Text:</label>
                    <input type="text" name="question${count}" placeholder="Enter question text" required>
                </div>
                <label>Correct Answer & Options:</label>
                <div class="options-grid" id="options_grid_${count}">
                    <div class="option-input">
                        <input type="radio" name="answer${count}" value="" checked required>
                        <input type="text" name="options_${count}[]" placeholder="Option 1" oninput="syncRadio(this)" required>
                        <button type="button" class="btn btn-small btn-danger" onclick="this.parentElement.remove()">×</button>
                    </div>
                    <div class="option-input">
                        <input type="radio" name="answer${count}" value="" required>
                        <input type="text" name="options_${count}[]" placeholder="Option 2" oninput="syncRadio(this)" required>
                        <button type="button" class="btn btn-small btn-danger" onclick="this.parentElement.remove()">×</button>
                    </div>
                </div>
                <button type="button" class="btn btn-small btn-secondary" onclick="addOption(${count})">+ Add Option</button>
                <div class="canvas-container" style="margin-top: 15px; padding: 12px; background: #2d2d2d; border-radius: 6px; border: 1px solid #444;">
                    <label style="color: #ccc;">Question Image (optional):</label>
                    <div style="margin-bottom: 10px;">
                        <button type="button" class="btn btn-dark" style="background: #444; color: #fff; border: 1px solid #555; padding: 8px 16px; border-radius: 4px; cursor: pointer; margin-right: 8px;" onclick="document.getElementById('file${count}').click()">📁 Upload File</button>
                        <button type="button" class="btn btn-dark" style="background: #444; color: #fff; border: 1px solid #555; padding: 8px 16px; border-radius: 4px; cursor: pointer;" onclick="document.getElementById('url${count}').focus()">🔗 Enter URL</button>
                        <input type="file" id="file${count}" name="image${count}" accept="image/*" style="display: none; margin-top: 8px;" onchange="previewImage(this, ${count})">
                        <input type="text" id="url${count}" name="image_url${count}" placeholder="https://example.com/image.jpg" style="width: 100%; padding: 8px; border: 1px solid #555; border-radius: 4px; background: #1a1a1a; color: #eee; margin-top: 8px;">
                        <div id="preview${count}" style="margin-top: 10px;"></div>
                    </div>
                </div>
                <div style="text-align: right; margin-top: 15px;">
                    <button type="button" class="btn btn-small btn-danger" onclick="removeQuestion(${count})">Delete Question</button>
                </div>
            `;
            container.appendChild(div);
            updateQuestionCount();
        }

        function removeQuestion(id) {
            const el = document.getElementById('question_' + id);
            if (el) {
                el.remove();
                renumberQuestions();
            }
        }

        function renumberQuestions() {
            const blocks = document.querySelectorAll('.question-block');
            blocks.forEach((block, idx) => {
                const newId = idx + 1;
                block.id = 'question_' + newId;
                block.querySelector('h3').innerText = 'Question ' + newId;
                block.querySelector('input[name^="question"]').name = 'question' + newId;
                
                const fileInput = block.querySelector('input[type="file"]');
                if (fileInput) fileInput.name = 'image' + newId;

                const urlInput = block.querySelector('input[name^="image_url"]');
                if (urlInput) urlInput.name = 'image_url' + newId;

                block.querySelector('.options-grid').id = 'options_grid_' + newId;
                block.querySelector('button[onclick^="addOption"]').setAttribute('onclick', `addOption(${newId})`);
                block.querySelector('button[onclick^="removeQuestion"]').setAttribute('onclick', `removeQuestion(${newId})`);
                
                block.querySelectorAll('.option-input').forEach(opt => {
                    opt.querySelector('input[type="radio"]').name = 'answer' + newId;
                    opt.querySelector('input[type="text"]').name = 'options_' + newId + '[]';
                });
            });
            updateQuestionCount();
        }

        function updateQuestionCount() {
            document.getElementById('questionCount').value = document.querySelectorAll('.question-block').length;
        }

        function previewImage(input, qNum) {
            const preview = document.getElementById('preview' + qNum);
            preview.innerHTML = '';
            
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.innerHTML = `
                        <div style="position: relative; display: inline-block; margin-top: 10px;">
                            <img src="${e.target.result}" style="max-width: 150px; border-radius: 4px; display: block;">
                            <small style="color: #aaa; display: block;">Selected: ${input.files[0].name}</small>
                            <button type="button" class="btn btn-small btn-danger" style="margin-top: 5px;" onclick="clearFile(${qNum})">✕ Clear File</button>
                        </div>
                    `;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function clearFile(qNum) {
            const fileInput = document.getElementById('file' + qNum);
            fileInput.value = '';
            document.getElementById('preview' + qNum).innerHTML = '';
        }

        // Add first question by default
        addQuestion();
    </script>
    <script src="{{ url_for('static', filename='theme.js') }}"></script>
</body>
</html>
