<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container narrow">
        <h1>Your Profile</h1>
        <a href="{{ url_for('home') }}" class="btn btn-secondary">Back to Home</a>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="flash-list">
                    {% for category, message in messages %}
                    <div class="flash flash-{{ category }}">{{ message }}</div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        <div class="profile-preview">
            <img src="{{ user_profile.avatar_url }}" alt="{{ user_profile.username }}" class="avatar-lg">
            <h2>{{ user_profile.username }}</h2>
        </div>

        <form method="POST" enctype="multipart/form-data">
            <div class="form-group">
                <label for="description">Description</label>
                <textarea name="description" id="description" rows="4">{{ user_profile.description }}</textarea>
            </div>
            <div class="form-group">
                <label for="avatar">Avatar URL</label>
                <input type="text" name="avatar" id="avatar" value="{{ user_profile.avatar }}">
            </div>
            <div class="form-group">
                <label for="avatar_file">Avatar From PC</label>
                <input type="file" name="avatar_file" id="avatar_file" accept=".png,.jpg,.jpeg,.gif,.webp">
                <p class="muted">If you upload a file, it will be used instead of Avatar URL.</p>
            </div>
            <button type="submit" class="btn">Save Profile</button>
        </form>
    </div>
    <script src="{{ url_for('static', filename='theme.js') }}"></script>
</body>
</html>
